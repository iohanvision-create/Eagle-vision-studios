<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Eagle Vision Studio — Content, Film, and Branding for the next generation of creators and businesses."
    />
    <meta name="theme-color" content="#000000" />
    <title>Eagle Vision Studio</title>

    <!-- Google Fonts: Playfair Display (headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="src/styles/main.css" />
    <link rel="stylesheet" href="src/styles/animations.css" />
  </head>
  <body>

    <!-- =============================================
         APP ROOT — all content injected by JavaScript
         ============================================= -->
    <div id="app"></div>

    <!-- =============================================
         PAGE LOADER — shown while assets load
         ============================================= -->
    <div id="loader" class="loader" role="status" aria-label="Loading Eagle Vision Studio">
      <div class="loader__inner">
        <div class="loader__mark">EV</div>
        <div class="loader__bar-wrap">
          <div class="loader__bar"></div>
        </div>
        <p class="loader__label">Eagle Vision Studio</p>
      </div>
    </div>

    <!-- Main entry point (ES Module) -->
    <script type="module" src="src/main.js"></script>
  </body>
</html>
